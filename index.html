<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>割草合成塔防（MVP）</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: #141b2d;
        --panel2: #0f1627;
        --text: #e6eaf2;
        --muted: #a8b0c2;
        --accent: #5ae4a8;
        --danger: #ff5a6a;
        --grid-gap: 10px;
        --radius: 12px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "PingFang SC",
          "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background: radial-gradient(1200px 700px at 50% -150px, #1f2b52 0%, var(--bg) 55%);
      }

      .app {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 18px 16px;
        gap: 14px;
      }

      .frame {
        width: min(1100px, 100%);
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .top {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0) 100%),
          var(--panel);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: var(--radius);
        overflow: hidden;
      }

      .canvasWrap {
        position: relative;
      }

      canvas {
        width: 100%;
        height: 420px;
        display: block;
        background: linear-gradient(180deg, rgba(90, 228, 168, 0.06) 0%, rgba(0, 0, 0, 0) 45%),
          radial-gradient(900px 380px at 50% 0%, rgba(96, 165, 250, 0.14) 0%, rgba(0, 0, 0, 0) 60%);
      }

      .hud {
        position: absolute;
        top: 12px;
        left: 12px;
        right: 12px;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        pointer-events: none;
      }

      .hud .pill {
        padding: 8px 10px;
        border-radius: 999px;
        background: rgba(15, 22, 39, 0.76);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: var(--text);
        font-size: 12px;
        display: inline-flex;
        gap: 10px;
        align-items: center;
      }

      .upgradeTip {
        position: absolute;
        top: 54px;
        left: 50%;
        transform: translateX(-50%);
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(15, 22, 39, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.14);
        color: rgba(255, 235, 120, 0.96);
        font-size: 13px;
        font-weight: 750;
        letter-spacing: 0.2px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 120ms ease, transform 120ms ease;
      }

      body.upgradeMode .upgradeTip {
        opacity: 1;
        transform: translateX(-50%) translateY(0px);
      }

      body.upgradeMode {
        cursor: pointer;
      }

      .grid.upgradeMode .cell {
        outline: 1px solid rgba(255, 235, 120, 0.14);
      }

      .xpHud {
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        display: grid;
        gap: 6px;
        width: min(520px, calc(100% - 32px));
        pointer-events: none;
      }

      .xpHud .row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        color: rgba(255, 255, 255, 0.9);
        font-weight: 750;
        font-size: 13px;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.4);
      }

      .xpBar {
        height: 12px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }

      .xpBar .fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, rgba(55, 210, 115, 0.9), rgba(90, 228, 168, 0.92));
        border-radius: 999px;
        transition: width 140ms linear;
      }

      .mid {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0) 100%),
          var(--panel);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: var(--radius);
        padding: 14px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .gridHead {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
      }

      .gridHead h2 {
        font-size: 14px;
        margin: 0;
        color: var(--text);
        font-weight: 650;
        letter-spacing: 0.2px;
      }

      .gridHead .hint {
        font-size: 12px;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: var(--grid-gap);
        touch-action: none;
        user-select: none;
      }

      .cell {
        aspect-ratio: 1 / 1;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        position: relative;
        overflow: hidden;
      }

      .cell::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(200px 120px at 50% -40px, rgba(90, 228, 168, 0.08) 0%, rgba(0, 0, 0, 0) 60%);
        opacity: 0.8;
        pointer-events: none;
      }

      .cell.isTarget {
        outline: 2px solid rgba(90, 228, 168, 0.75);
        box-shadow: 0 0 0 4px rgba(90, 228, 168, 0.14);
      }

      .cell.isMergeTarget {
        outline: 2px solid rgba(96, 165, 250, 0.85);
        box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.16);
      }

      .tower {
        position: absolute;
        inset: 10px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        font-weight: 800;
        font-size: 22px;
        letter-spacing: 0.3px;
        color: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(0, 0, 0, 0.25);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.25);
        cursor: default;
      }

      .tower .sub {
        position: absolute;
        top: 8px;
        left: 8px;
        font-size: 11px;
        opacity: 0.85;
        font-weight: 700;
      }

      .bottom {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0) 100%),
          var(--panel);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: var(--radius);
        padding: 12px 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .stats {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--text);
        font-size: 13px;
      }

      .stats .k {
        color: var(--muted);
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      button {
        border: none;
        border-radius: 12px;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.07);
        color: var(--text);
        border: 1px solid rgba(255, 255, 255, 0.12);
        cursor: pointer;
        transition: transform 140ms ease, background 140ms ease, border-color 140ms ease;
        font-weight: 650;
        font-size: 13px;
      }

      button:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.18);
      }

      button:active {
        transform: translateY(0px);
      }

      button.primary {
        background: rgba(90, 228, 168, 0.16);
        border-color: rgba(90, 228, 168, 0.45);
      }

      button.primary:hover {
        background: rgba(90, 228, 168, 0.22);
        border-color: rgba(90, 228, 168, 0.6);
      }

      button.upgrade {
        background: rgba(255, 235, 120, 0.12);
        border-color: rgba(255, 235, 120, 0.42);
      }

      button.upgrade:hover {
        background: rgba(255, 235, 120, 0.18);
        border-color: rgba(255, 235, 120, 0.58);
      }

      button.upgrade.active {
        background: rgba(255, 235, 120, 0.22);
        border-color: rgba(255, 235, 120, 0.72);
      }

      button.danger {
        background: rgba(255, 90, 106, 0.14);
        border-color: rgba(255, 90, 106, 0.4);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
        transform: none;
      }

      .levelUpFx {
        position: absolute;
        inset: 0;
        pointer-events: none;
        display: grid;
        place-items: center;
      }

      .levelUpFx .ring {
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 999px;
        border: 2px solid rgba(255, 255, 255, 0.95);
        box-shadow: 0 0 14px rgba(255, 255, 255, 0.45);
        animation: levelUpRing 520ms ease-out forwards;
      }

      .levelUpFx .beam {
        position: absolute;
        left: 50%;
        top: 8px;
        bottom: 8px;
        width: 10px;
        transform: translateX(-50%);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0),
          rgba(255, 255, 255, 0.92),
          rgba(255, 255, 255, 0)
        );
        filter: blur(0.2px);
        animation: levelUpBeam 520ms ease-out forwards;
      }

      .levelUpFx .label {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.98);
        font-weight: 900;
        font-size: 12px;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.55);
        letter-spacing: 0.4px;
        animation: levelUpLabel 620ms ease-out forwards;
      }

      @keyframes levelUpRing {
        0% {
          transform: scale(1);
          opacity: 0.95;
        }
        100% {
          transform: scale(14);
          opacity: 0;
        }
      }

      @keyframes levelUpBeam {
        0% {
          opacity: 0;
          transform: translateX(-50%) scaleY(0.4);
        }
        20% {
          opacity: 0.95;
          transform: translateX(-50%) scaleY(1);
        }
        100% {
          opacity: 0;
          transform: translateX(-50%) scaleY(1.05);
        }
      }

      @keyframes levelUpLabel {
        0% {
          opacity: 0;
          transform: translateX(-50%) translateY(6px);
        }
        30% {
          opacity: 1;
          transform: translateX(-50%) translateY(0px);
        }
        100% {
          opacity: 0;
          transform: translateX(-50%) translateY(-10px);
        }
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 20px;
        transform: translate(-50%, 20px);
        opacity: 0;
        background: rgba(15, 22, 39, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: var(--text);
        border-radius: 999px;
        padding: 10px 12px;
        font-size: 13px;
        display: inline-flex;
        gap: 8px;
        align-items: center;
        transition: transform 180ms ease, opacity 180ms ease;
        z-index: 10000;
        pointer-events: none;
      }

      .toast.show {
        transform: translate(-50%, 0px);
        opacity: 1;
      }

      .overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.52);
        display: none;
        place-items: center;
      }

      .overlay.show {
        display: grid;
      }

      .card {
        width: min(520px, calc(100% - 28px));
        background: rgba(15, 22, 39, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 16px;
        padding: 16px;
      }

      .card h3 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      .card p {
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .card .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      @media (max-width: 720px) {
        canvas {
          height: 360px;
        }

        .tower {
          font-size: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="frame">
        <div class="top">
          <div class="canvasWrap">
            <canvas id="battle" width="1100" height="420"></canvas>
            <div class="hud">
              <div class="pill" id="hudLeft">状态：运行中</div>
              <div class="pill" id="hudRight">难度：1.00 · 生成间隔：900ms</div>
            </div>
            <div class="xpHud" id="xpHud">
              <div class="row">
                <span id="playerLevelLabel">Player Level: 1</span>
              </div>
              <div class="xpBar"><div class="fill" id="xpFill"></div></div>
            </div>
            <div class="upgradeTip" id="upgradeTip">请选择一个操作</div>
            <div class="overlay" id="overlay">
              <div class="card">
                <h3>失败</h3>
                <p id="overText">有敌人突破了防线。</p>
                <div class="row">
                  <span style="color: var(--muted); font-size: 12px">提示：通过经验升级获得升级点，放置/升级武器</span>
                  <button id="restartBtn2" class="primary">重开</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="mid">
          <div class="gridHead">
            <h2>塔防网格（5×5）</h2>
            <div class="hint">升级后获得升级点，点击按钮后在网格放置或升级武器</div>
          </div>
          <div class="grid" id="grid"></div>
        </div>

        <div class="bottom">
          <div class="stats">
            <span><span class="k">分数</span>：<span id="score">0</span></span>
            <span><span class="k">击杀</span>：<span id="kills">0</span></span>
            <span><span class="k">波次</span>：<span id="wave">1</span></span>
            <span><span class="k">升级点</span>：<span id="upgradePoints">0</span></span>
          </div>
          <div class="actions">
            <button id="placeBtn" class="primary" disabled>放置新武器 (消耗 1 升级点)</button>
            <button id="upgradeBtn" class="upgrade" disabled>升级现有武器 (消耗 1 升级点)</button>
            <button id="saveBtn">保存游戏</button>
            <button id="pauseBtn">暂停</button>
            <button id="restartBtn" class="danger">重开</button>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const GRID_SIZE = 5;
      let START_GOLD = 0;
      const API_BASE = "http://127.0.0.1:8000";
      let gameConfig = null;

      let playerLevel = 1;
      let playerXp = 0;
      let upgradePoints = 1;
      let xpToNextLevels = [100, 250, 500, 1000, 2000];
      let isPlacingMode = false;
      let isUpgradingMode = false;

      const battleCanvas = document.getElementById("battle");
      const ctx = battleCanvas.getContext("2d");
      const gridEl = document.getElementById("grid");

      const hudLeftEl = document.getElementById("hudLeft");
      const hudRightEl = document.getElementById("hudRight");
      const overlayEl = document.getElementById("overlay");
      const overTextEl = document.getElementById("overText");

      const scoreEl = document.getElementById("score");
      const killsEl = document.getElementById("kills");
      const waveEl = document.getElementById("wave");
      const upgradePointsEl = document.getElementById("upgradePoints");
      const placeBtn = document.getElementById("placeBtn");
      const upgradeBtn = document.getElementById("upgradeBtn");
      const saveBtn = document.getElementById("saveBtn");
      const pauseBtn = document.getElementById("pauseBtn");
      const restartBtn = document.getElementById("restartBtn");
      const restartBtn2 = document.getElementById("restartBtn2");

      const toastEl = document.getElementById("toast");
      const upgradeTipEl = document.getElementById("upgradeTip");
      const playerLevelLabelEl = document.getElementById("playerLevelLabel");
      const xpFillEl = document.getElementById("xpFill");
      const xpHudEl = document.getElementById("xpHud");

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function randInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function pickRandom(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
      }

      function showToast(text) {
        toastEl.textContent = text;
        toastEl.classList.add("show");
        window.clearTimeout(showToast._t);
        showToast._t = window.setTimeout(() => toastEl.classList.remove("show"), 1000);
      }

      function fitCanvasToCssSize(canvas) {
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        const w = Math.max(1, Math.floor(rect.width * dpr));
        const h = Math.max(1, Math.floor(rect.height * dpr));
        if (canvas.width !== w || canvas.height !== h) {
          canvas.width = w;
          canvas.height = h;
        }
      }

      function towerColor(level) {
        const hue = (210 + (level - 1) * 32) % 360;
        return `hsl(${hue} 85% 55%)`;
      }

      function towerColorDark(level) {
        const hue = (210 + (level - 1) * 32) % 360;
        return `hsl(${hue} 85% 44%)`;
      }

      function getTowerStats(level) {
        const maxLv = gameConfig?.meta?.max_tower_level ?? 5;
        const lv = clamp(level, 1, maxLv);
        const t = gameConfig?.towers?.[String(lv)] ?? null;
        if (t) {
          return {
            damage: Number(t.damage) || 1,
            fireRate: Number(t.fire_rate) || 1,
            bulletSpeed: Number(t.bullet_speed) || 520,
            range: 99999,
            splashRadius: Math.max(0, Number(t.splash_radius) || 0),
            critRate: clamp(Number(t.crit_rate) || 0, 0, 1),
            critMultiplier: Math.max(1, Number(t.crit_multiplier) || 1),
          };
        }
        return {
          damage: 1 + lv * 1,
          fireRate: 0.65 + lv * 0.25,
          bulletSpeed: 520 + lv * 35,
          range: 99999,
          splashRadius: lv >= 3 ? 10 + lv * 15 : 0,
          critRate: clamp(0.04 + lv * 0.03, 0, 1),
          critMultiplier: Math.max(1, 1.35 + lv * 0.15),
        };
      }

      function getWaveConfig(wave) {
        const ws = gameConfig?.waves ?? [];
        if (!ws.length) {
          const isBoss = wave % 5 === 0;
          const baseHp = 3 + (wave - 1) * 1;
          const baseSpeed = 55 + (wave - 1) * 2.4;
          const baseXp = 8 + wave * 3;
          return {
            wave,
            spawn_interval_ms: 900,
            enemy_hp: isBoss ? Math.floor(baseHp * 22) : baseHp,
            enemy_speed: isBoss ? baseSpeed * 0.5 : baseSpeed,
            kill_reward: isBoss ? 50 : 1,
            enemy_count: isBoss ? 1 : 18,
            is_boss: isBoss,
            xp_drop: isBoss ? Math.floor(baseXp * 25) : baseXp,
          };
        }
        const idx = clamp(wave - 1, 0, ws.length - 1);
        return ws[idx];
      }

      function getXpNeeded(level) {
        const lv = Math.max(1, Math.floor(Number(level) || 1));
        if (lv <= xpToNextLevels.length) return Number(xpToNextLevels[lv - 1]) || 100;
        const base = Number(xpToNextLevels[xpToNextLevels.length - 1]) || 2000;
        const extra = lv - xpToNextLevels.length;
        return Math.round(base * Math.pow(1.25, extra));
      }

      function refreshXpUi() {
        const need = getXpNeeded(playerLevel);
        const p = need > 0 ? clamp(playerXp / need, 0, 1) : 0;
        xpFillEl.style.width = `${Math.round(p * 100)}%`;
        playerLevelLabelEl.textContent = `Player Level: ${playerLevel}`;
      }

      function addXp(amount) {
        let v = Math.max(0, Math.floor(Number(amount) || 0));
        if (v <= 0) return;
        playerXp += v;
        while (playerXp >= getXpNeeded(playerLevel)) {
          playerXp -= getXpNeeded(playerLevel);
          playerLevel += 1;
          upgradePoints += 1;
          showToast("LEVEL UP!");
        }
      }

      function updateModeUi() {
        const active = isPlacingMode || isUpgradingMode;
        document.body.classList.toggle("upgradeMode", active);
        battleCanvas.style.cursor = active ? "pointer" : "default";

        placeBtn.classList.toggle("active", isPlacingMode);
        upgradeBtn.classList.toggle("active", isUpgradingMode);

        if (!active) {
          upgradeTipEl.style.opacity = "0";
          return;
        }

        upgradeTipEl.style.opacity = "1";
        upgradeTipEl.textContent = isPlacingMode ? "请点击空地放置新武器" : "请点击要升级的防御塔";
      }

      function setPlacingMode(on) {
        isPlacingMode = Boolean(on);
        if (isPlacingMode) isUpgradingMode = false;
        updateModeUi();
      }

      function setUpgradingMode(on) {
        isUpgradingMode = Boolean(on);
        if (isUpgradingMode) isPlacingMode = false;
        updateModeUi();
      }

      function buildGridData2D() {
        const out = [];
        for (let r = 0; r < GRID_SIZE; r++) {
          const row = [];
          for (let c = 0; c < GRID_SIZE; c++) {
            const idx = rcToIndex(r, c);
            row.push(state.grid[idx]?.level ?? 0);
          }
          out.push(row);
        }
        return out;
      }

      async function apiFetchJson(path, init) {
        const res = await fetch(`${API_BASE}${path}`, init);
        if (!res.ok) {
          const text = await res.text().catch(() => "");
          throw new Error(`${res.status} ${res.statusText}${text ? `: ${text}` : ""}`);
        }
        return await res.json();
      }

      const state = {
        running: true,
        gameOver: false,
        startedAt: performance.now(),
        timeSec: 0,
        gold: START_GOLD,
        score: 0,
        kills: 0,
        wave: 1,
        highestWave: 1,

        grid: Array.from({ length: GRID_SIZE * GRID_SIZE }, () => null),

        enemies: [],
        bullets: [],
        xpOrbs: [],
        floatingTexts: [],
        explosions: [],

        waveCfg: null,
        wavePhase: "spawning",
        wavePhaseMs: 0,
        waveSpawned: 0,
        waveToSpawn: 0,
        bossWarningT: 0,

        spawnIntervalMs: 900,
        spawnTimerMs: 0,
      };

      function startWave(wave) {
        state.wave = Math.max(1, Math.floor(Number(wave) || 1));
        state.highestWave = Math.max(state.highestWave, state.wave);

        const cfg = getWaveConfig(state.wave);
        const isBoss = Boolean(cfg?.is_boss);

        state.waveCfg = cfg;
        state.waveSpawned = 0;
        state.waveToSpawn = Math.max(1, Math.floor(Number(cfg?.enemy_count) || (isBoss ? 1 : 18)));
        state.spawnIntervalMs = Math.max(80, Math.floor(Number(cfg?.spawn_interval_ms) || 900));
        state.spawnTimerMs = 200;

        if (isBoss) {
          state.wavePhase = "warning";
          state.wavePhaseMs = 2000;
          state.bossWarningT = 0;
        } else {
          state.wavePhase = "spawning";
          state.wavePhaseMs = 0;
        }
      }

      function resetGame() {
        state.running = true;
        state.gameOver = false;
        overlayEl.classList.remove("show");
        state.startedAt = performance.now();
        state.timeSec = 0;
        playerLevel = 1;
        playerXp = 0;
        upgradePoints = 1;
        setPlacingMode(false);
        setUpgradingMode(false);
        state.gold = 0;
        state.score = 0;
        state.kills = 0;
        state.wave = 1;
        state.highestWave = 1;

        state.grid = Array.from({ length: GRID_SIZE * GRID_SIZE }, () => null);
        state.enemies = [];
        state.bullets = [];
        state.xpOrbs = [];
        state.floatingTexts = [];
        state.explosions = [];
        startWave(1);
        state.wavePhase = "prep";
        state.wavePhaseMs = 2500;
        syncUI();
      }


      function indexToRC(index) {
        return { r: Math.floor(index / GRID_SIZE), c: index % GRID_SIZE };
      }

      function rcToIndex(r, c) {
        return r * GRID_SIZE + c;
      }

      function getTowerWorldPos(index) {
        const { r, c } = indexToRC(index);
        const a = getGridArea();
        return { x: a.x + (c + 0.5) * a.cell, y: a.y + (r + 0.5) * a.cell };
      }

      function createTower(level) {
        const stats = getTowerStats(level);
        return {
          level,
          fireCooldown: 0,
          stats,
        };
      }

      function getEmptyCells() {
        const out = [];
        for (let i = 0; i < state.grid.length; i++) {
          if (!state.grid[i]) out.push(i);
        }
        return out;
      }

      function syncUI() {
        scoreEl.textContent = String(state.score);
        killsEl.textContent = String(state.kills);
        waveEl.textContent = String(state.wave);
        upgradePointsEl.textContent = String(upgradePoints);
        placeBtn.disabled = upgradePoints <= 0 || getEmptyCells().length === 0 || state.gameOver;
        upgradeBtn.disabled = upgradePoints <= 0 || state.gameOver;
        saveBtn.disabled = state.gameOver;
        pauseBtn.disabled = state.gameOver;
        hudLeftEl.textContent = state.gameOver
          ? "状态：失败"
          : state.running
            ? "状态：运行中"
            : "状态：已暂停";
        hudRightEl.textContent = `波次：${state.wave} · 生成间隔：${Math.round(state.spawnIntervalMs)}ms`;
        refreshXpUi();
      }

      function playLevelUpFxAtIndex(index) {
        const cell = gridEl.children?.[index];
        if (!cell) return;
        const fx = document.createElement("div");
        fx.className = "levelUpFx";
        const ring = document.createElement("div");
        ring.className = "ring";
        const beam = document.createElement("div");
        beam.className = "beam";
        const label = document.createElement("div");
        label.className = "label";
        label.textContent = "LEVEL UP!";
        fx.appendChild(ring);
        fx.appendChild(beam);
        fx.appendChild(label);
        cell.appendChild(fx);
        window.setTimeout(() => fx.remove(), 700);
      }

      function renderGrid() {
        const children = gridEl.children;
        if (children.length !== GRID_SIZE * GRID_SIZE) {
          gridEl.innerHTML = "";
          for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
            const cell = document.createElement("div");
            cell.className = "cell";
            cell.dataset.index = String(i);
            gridEl.appendChild(cell);
          }
        }

        for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
          const cell = gridEl.children[i];
          const tower = state.grid[i];
          cell.innerHTML = "";
          if (tower) {
            const el = document.createElement("div");
            el.className = "tower";
            el.style.background = `linear-gradient(180deg, ${towerColor(tower.level)} 0%, ${towerColorDark(tower.level)} 100%)`;

            const sub = document.createElement("div");
            sub.className = "sub";
            sub.textContent = `Lv.${tower.level}`;
            el.appendChild(sub);

            el.appendChild(document.createTextNode(String(tower.level)));
            el.dataset.index = String(i);
            cell.appendChild(el);
          }
        }
      }

      function getGridArea() {
        const w = battleCanvas.width;
        const h = battleCanvas.height;
        const pad = 18;
        const maxCellW = (w - pad * 2) / GRID_SIZE;
        const maxCellH = (h - pad * 2) / GRID_SIZE;
        const cell = Math.floor(Math.max(32, Math.min(maxCellW, maxCellH, 88)));
        const gridW = cell * GRID_SIZE;
        const gridH = cell * GRID_SIZE;
        const x = Math.floor((w - gridW) / 2);
        const y = Math.floor(h - gridH - pad);
        return { x, y, cell, gridW, gridH };
      }

      function canvasPointToGridIndex(x, y) {
        const a = getGridArea();
        if (x < a.x || x > a.x + a.gridW || y < a.y || y > a.y + a.gridH) return null;
        const col = clamp(Math.floor((x - a.x) / a.cell), 0, GRID_SIZE - 1);
        const row = clamp(Math.floor((y - a.y) / a.cell), 0, GRID_SIZE - 1);
        return rcToIndex(row, col);
      }

      battleCanvas.addEventListener("click", (e) => {
        if (!isPlacingMode && !isUpgradingMode) return;
        if (upgradePoints <= 0) return;

        const p = domPointToCanvas(e.clientX, e.clientY);
        const idx = canvasPointToGridIndex(p.x, p.y);
        if (idx == null) return;

        if (isPlacingMode) {
          if (!state.grid[idx]) {
            state.grid[idx] = createTower(1);
            upgradePoints = Math.max(0, upgradePoints - 1);
            setPlacingMode(false);
            renderGrid();
            syncUI();
          }
          return;
        }

        if (isUpgradingMode) {
          const t = state.grid[idx];
          if (!t) return;
          const maxLv = gameConfig?.meta?.max_tower_level ?? 5;
          if (t.level >= maxLv) return;
          t.level += 1;
          t.stats = getTowerStats(t.level);
          t.fireCooldown = 0;
          upgradePoints = Math.max(0, upgradePoints - 1);
          setUpgradingMode(false);
          renderGrid();
          playLevelUpFxAtIndex(idx);
          syncUI();
        }
      });

      function createEnemy(waveCfg) {
        const isBoss = Boolean(waveCfg?.is_boss);
        const size = isBoss ? 64 : 26;
        const x = randInt(20, battleCanvas.width - 20);

        const hp = Number(waveCfg.enemy_hp) || 3;
        const speed = Number(waveCfg.enemy_speed) || 55;
        const reward = Number(waveCfg.kill_reward) || 1;
        const xpDrop = Math.max(1, Math.floor(Number(waveCfg.xp_drop) || 1));

        return {
          id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          x,
          y: -size,
          size,
          hp,
          hpMax: hp,
          speed,
          reward,
          isBoss,
          xpDrop,
        };
      }

      function updateWaveManagement(dtMs, dtSec) {
        if (state.wavePhase === "prep") {
          const hasWeapon = state.grid.some(Boolean);
          if (!hasWeapon) return;
          state.wavePhaseMs -= dtMs;
          if (state.wavePhaseMs <= 0) {
            state.wavePhase = "spawning";
            state.spawnTimerMs = 0;
          }
          return;
        }

        if (state.wavePhase === "warning") {
          state.wavePhaseMs -= dtMs;
          state.bossWarningT += dtSec;
          if (state.wavePhaseMs <= 0) {
            state.wavePhase = "spawning";
            state.spawnTimerMs = 0;
          }
          return;
        }

        if (state.wavePhase === "spawning") {
          state.spawnTimerMs -= dtMs;
          while (state.spawnTimerMs <= 0 && state.waveSpawned < state.waveToSpawn) {
            state.spawnTimerMs += state.spawnIntervalMs;
            state.enemies.push(createEnemy(state.waveCfg ?? getWaveConfig(state.wave)));
            state.waveSpawned += 1;
          }
          if (state.waveSpawned >= state.waveToSpawn) {
            state.wavePhase = "clearing";
          }
          return;
        }

        if (state.wavePhase === "clearing") {
          if (state.enemies.length === 0) {
            state.wavePhase = "intermission";
            state.wavePhaseMs = randInt(2000, 3000);
          }
          return;
        }

        if (state.wavePhase === "intermission") {
          state.wavePhaseMs -= dtMs;
          if (state.wavePhaseMs <= 0) {
            startWave(state.wave + 1);
          }
        }
      }

      function fireFromTower(towerIndex, tower, dtSec) {
        tower.fireCooldown = Math.max(0, tower.fireCooldown - dtSec);
        if (tower.fireCooldown > 0) return;
        if (state.enemies.length === 0) return;

        const origin = getTowerWorldPos(towerIndex);

        let best = null;
        let bestDist2 = Infinity;
        for (const e of state.enemies) {
          const dx = e.x - origin.x;
          const dy = e.y - origin.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < bestDist2) {
            bestDist2 = d2;
            best = e;
          }
        }
        if (!best) return;

        const stats = tower.stats;
        const dx = best.x - origin.x;
        const dy = best.y - origin.y;
        const len = Math.hypot(dx, dy) || 1;
        const vx = (dx / len) * stats.bulletSpeed;
        const vy = (dy / len) * stats.bulletSpeed;

        state.bullets.push({
          x: origin.x,
          y: origin.y,
          vx,
          vy,
          r: 4,
          dmg: stats.damage,
          ttl: 1.8,
          splashRadius: stats.splashRadius || 0,
          critRate: stats.critRate || 0,
          critMultiplier: stats.critMultiplier || 1,
        });

        tower.fireCooldown = 1 / stats.fireRate;
      }

      function updateTowers(dtSec) {
        for (let i = 0; i < state.grid.length; i++) {
          const tower = state.grid[i];
          if (!tower) continue;
          fireFromTower(i, tower, dtSec);
        }
      }

      function updateEnemies(dtSec) {
        const bottom = battleCanvas.height - 4;
        for (const e of state.enemies) {
          e.y += e.speed * dtSec;
          if (e.y + e.size / 2 >= bottom) {
            state.gameOver = true;
          }
        }
      }

      function updateBullets(dtSec) {
        for (const b of state.bullets) {
          b.x += b.vx * dtSec;
          b.y += b.vy * dtSec;
          b.ttl -= dtSec;
        }
        state.bullets = state.bullets.filter((b) => b.ttl > 0);
      }

      function domPointToCanvas(clientX, clientY) {
        const rect = battleCanvas.getBoundingClientRect();
        const sx = rect.width > 0 ? battleCanvas.width / rect.width : 1;
        const sy = rect.height > 0 ? battleCanvas.height / rect.height : 1;
        return { x: (clientX - rect.left) * sx, y: (clientY - rect.top) * sy };
      }

      function getXpTargetCanvasPos() {
        const rect = xpHudEl.getBoundingClientRect();
        return domPointToCanvas(rect.left + rect.width / 2, rect.top + rect.height / 2);
      }

      function spawnXpOrb(x, y, amount) {
        const xp = Math.max(1, Math.floor(Number(amount) || 1));
        state.xpOrbs.push({
          x,
          y,
          xp,
        });
      }

      function updateXpOrbs(dtSec) {
        if (!state.xpOrbs.length) return;
        const target = getXpTargetCanvasPos();
        const remaining = [];
        for (const orb of state.xpOrbs) {
          const dx = target.x - orb.x;
          const dy = target.y - orb.y;
          const len = Math.hypot(dx, dy) || 1;
          const speed = 520;
          orb.x += (dx / len) * speed * dtSec;
          orb.y += (dy / len) * speed * dtSec;
          if (len <= 18) {
            addXp(orb.xp);
          } else {
            remaining.push(orb);
          }
        }
        state.xpOrbs = remaining;
      }

      function addTextPopup(x, y, text, opts) {
        const ttl = Math.max(0.1, Number(opts?.ttl) || 1.0);
        state.floatingTexts.push({
          text: String(text),
          x,
          y,
          vy: Number(opts?.vy) || -65,
          ttl,
          life: ttl,
          color: String(opts?.color || "rgba(255, 255, 255, 1)"),
          fontSize: Math.max(10, Number(opts?.fontSize) || 14),
          bold: Boolean(opts?.bold),
        });
      }

      function addFloatingText(x, y, amount, isCrit) {
        const dmg = Math.max(0, Math.round(amount));
        addTextPopup(x, y, dmg, {
          vy: isCrit ? -85 : -65,
          ttl: 1.0,
          color: isCrit ? "rgba(255, 72, 72, 1)" : "rgba(255, 255, 255, 1)",
          fontSize: isCrit ? 20 : 14,
          bold: Boolean(isCrit),
        });
      }

      function addExplosion(x, y, maxR) {
        state.explosions.push({
          x,
          y,
          maxR: Math.max(0, Number(maxR) || 0),
          ttl: 0.35,
          life: 0.35,
        });
      }

      function updateFloatingTexts(dtSec) {
        for (const t of state.floatingTexts) {
          t.y += t.vy * dtSec;
          t.ttl -= dtSec;
        }
        state.floatingTexts = state.floatingTexts.filter((t) => t.ttl > 0);
      }

      function updateExplosions(dtSec) {
        for (const ex of state.explosions) {
          ex.ttl -= dtSec;
        }
        state.explosions = state.explosions.filter((ex) => ex.ttl > 0);
      }

      function resolveHits() {
        const remainingBullets = [];

        for (const b of state.bullets) {
          let hitEnemy = null;
          for (const e of state.enemies) {
            const dx = e.x - b.x;
            const dy = e.y - b.y;
            const rr = e.size / 2 + b.r;
            if (dx * dx + dy * dy <= rr * rr) {
              hitEnemy = e;
              break;
            }
          }
          if (!hitEnemy) {
            remainingBullets.push(b);
            continue;
          }

          const base = Number(b.dmg) || 0;
          const isCrit = Math.random() < (Number(b.critRate) || 0);
          const dmg = isCrit ? base * (Number(b.critMultiplier) || 1) : base;

          hitEnemy.hp -= dmg;
          addFloatingText(hitEnemy.x, hitEnemy.y, dmg, isCrit);

          const splashRadius = Math.max(0, Number(b.splashRadius) || 0);
          if (splashRadius > 0) {
            addExplosion(b.x, b.y, splashRadius);
            const r2 = splashRadius * splashRadius;
            for (const e of state.enemies) {
              if (e === hitEnemy) continue;
              if (e.hp <= 0) continue;
              const dx = e.x - b.x;
              const dy = e.y - b.y;
              if (dx * dx + dy * dy <= r2) {
                e.hp -= dmg;
                addFloatingText(e.x, e.y, dmg, isCrit);
              }
            }
          }
        }

        state.bullets = remainingBullets;

        const alive = [];
        for (const e of state.enemies) {
          if (e.hp <= 0) {
            state.kills += 1;
            state.score += 1;
            spawnXpOrb(e.x, e.y, e.xpDrop);
          } else {
            alive.push(e);
          }
        }
        state.enemies = alive;
      }

      function draw() {
        ctx.clearRect(0, 0, battleCanvas.width, battleCanvas.height);

        const w = battleCanvas.width;
        const h = battleCanvas.height;

        ctx.save();
        ctx.fillStyle = "rgba(255,255,255,0.04)";
        for (let i = 1; i < GRID_SIZE; i++) {
          const x = (i / GRID_SIZE) * w;
          ctx.fillRect(x - 0.5, 0, 1, h);
        }
        ctx.restore();

        ctx.save();
        ctx.strokeStyle = "rgba(90, 228, 168, 0.55)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, h - 3);
        ctx.lineTo(w, h - 3);
        ctx.stroke();
        ctx.restore();

        ctx.save();
        ctx.font = "700 18px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial";
        ctx.fillStyle = "rgba(255,255,255,0.88)";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.shadowColor = "rgba(0,0,0,0.45)";
        ctx.shadowBlur = 8;
        ctx.fillText(`Wave: ${state.wave}`, w / 2, 12);
        ctx.restore();

        const ga = getGridArea();
        for (let r = 0; r < GRID_SIZE; r++) {
          for (let c = 0; c < GRID_SIZE; c++) {
            const idx = rcToIndex(r, c);
            const cellX = ga.x + c * ga.cell;
            const cellY = ga.y + r * ga.cell;
            const tower = state.grid[idx];

            ctx.save();
            ctx.fillStyle = tower ? "rgba(0,0,0,0.12)" : "rgba(255,255,255,0.035)";
            ctx.strokeStyle = "rgba(255,255,255,0.10)";
            ctx.lineWidth = 1;
            ctx.fillRect(cellX + 1, cellY + 1, ga.cell - 2, ga.cell - 2);
            ctx.strokeRect(cellX + 1, cellY + 1, ga.cell - 2, ga.cell - 2);

            if (isPlacingMode && !tower) {
              ctx.strokeStyle = "rgba(55, 210, 115, 0.85)";
              ctx.lineWidth = 2;
              ctx.strokeRect(cellX + 2, cellY + 2, ga.cell - 4, ga.cell - 4);
            }
            if (isUpgradingMode && tower) {
              ctx.strokeStyle = "rgba(255, 235, 120, 0.9)";
              ctx.lineWidth = 2;
              ctx.strokeRect(cellX + 2, cellY + 2, ga.cell - 4, ga.cell - 4);
            }

            if (tower) {
              const pad = Math.max(6, Math.floor(ga.cell * 0.12));
              const tx = cellX + pad;
              const ty = cellY + pad;
              const tw = ga.cell - pad * 2;
              const th = ga.cell - pad * 2;
              ctx.fillStyle = towerColor(tower.level);
              if (ctx.roundRect) {
                ctx.beginPath();
                ctx.roundRect(tx, ty, tw, th, 10);
                ctx.fill();
              } else {
                ctx.fillRect(tx, ty, tw, th);
              }
              ctx.fillStyle = "rgba(255,255,255,0.96)";
              ctx.font = "800 18px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial";
              ctx.textAlign = "center";
              ctx.textBaseline = "middle";
              ctx.fillText(String(tower.level), cellX + ga.cell / 2, cellY + ga.cell / 2 + 4);
            }

            ctx.restore();
          }
        }

        for (const o of state.xpOrbs) {
          ctx.save();
          ctx.fillStyle = "rgba(55, 210, 115, 0.95)";
          ctx.shadowColor = "rgba(55, 210, 115, 0.55)";
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.arc(o.x, o.y, 6, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        for (const b of state.bullets) {
          ctx.save();
          ctx.fillStyle = "rgba(0,0,0,0.88)";
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        for (const e of state.enemies) {
          ctx.save();
          ctx.fillStyle = e.isBoss ? "rgba(64, 24, 86, 0.92)" : "rgba(255, 90, 106, 0.92)";
          ctx.fillRect(e.x - e.size / 2, e.y - e.size / 2, e.size, e.size);

          const barW = e.size * 1.15;
          const barH = 6;
          const p = clamp(e.hp / e.hpMax, 0, 1);
          const barX = e.x - barW / 2;
          const barY = e.y - e.size / 2 - 12;
          ctx.fillStyle = "rgba(220, 40, 40, 0.9)";
          ctx.fillRect(barX, barY, barW, barH);
          ctx.fillStyle = "rgba(55, 210, 115, 0.92)";
          ctx.fillRect(barX, barY, barW * p, barH);
          ctx.restore();
        }

        if (state.wavePhase === "warning") {
          const alpha = 0.35 + 0.65 * Math.abs(Math.sin(state.bossWarningT * 7));
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.font = "900 42px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial";
          ctx.fillStyle = "rgba(255, 55, 55, 1)";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.shadowColor = "rgba(0,0,0,0.7)";
          ctx.shadowBlur = 12;
          ctx.fillText("WARNING: BOSS INCOMING!", w / 2, h * 0.42);
          ctx.restore();
        }

        for (const ex of state.explosions) {
          const p = 1 - clamp(ex.ttl / ex.life, 0, 1);
          const r = (Number(ex.maxR) || 0) * p;
          const a = clamp(ex.ttl / ex.life, 0, 1);
          ctx.save();
          ctx.globalAlpha = a;
          ctx.fillStyle = "rgba(255, 180, 60, 0.22)";
          ctx.strokeStyle = "rgba(255, 200, 90, 0.55)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(ex.x, ex.y, r, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.restore();
        }

        for (let i = 0; i < state.grid.length; i++) {
          const t = state.grid[i];
          if (!t) continue;
          const origin = getTowerWorldPos(i);
          ctx.save();
          ctx.fillStyle = "rgba(255,255,255,0.08)";
          ctx.beginPath();
          ctx.arc(origin.x, origin.y, 6, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        for (const t of state.floatingTexts) {
          const a = clamp(t.ttl / t.life, 0, 1);
          ctx.save();
          ctx.globalAlpha = a;
          ctx.font = `${t.bold ? "700 " : ""}${t.fontSize}px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial`;
          ctx.fillStyle = t.color;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.shadowColor = "rgba(0,0,0,0.55)";
          ctx.shadowBlur = 4;
          ctx.fillText(t.text, t.x, t.y);
          ctx.restore();
        }
      }

      let lastTs = performance.now();
      function frame(ts) {
        const dtMs = clamp(ts - lastTs, 0, 50);
        lastTs = ts;
        const dtSec = dtMs / 1000;

        fitCanvasToCssSize(battleCanvas);

        if (state.running && !state.gameOver) {
          state.timeSec += dtSec;
          updateWaveManagement(dtMs, dtSec);

          updateTowers(dtSec);
          updateEnemies(dtSec);
          updateBullets(dtSec);
          resolveHits();
        }

        updateExplosions(dtSec);
        updateXpOrbs(dtSec);
        updateFloatingTexts(dtSec);

        if (state.gameOver) {
          state.running = false;
          overlayEl.classList.add("show");
          overTextEl.textContent = `有敌人突破了防线。你坚持了 ${state.timeSec.toFixed(1)} 秒，击杀 ${state.kills}。`;
        }

        draw();
        syncUI();
        requestAnimationFrame(frame);
      }

      placeBtn.addEventListener("click", () => {
        if (state.gameOver) return;
        if (upgradePoints <= 0) return;
        setPlacingMode(true);
        syncUI();
      });
      upgradeBtn.addEventListener("click", () => {
        if (state.gameOver) return;
        if (upgradePoints <= 0) return;
        setUpgradingMode(true);
        syncUI();
      });

      saveBtn.addEventListener("click", async () => {
        try {
          const userId = gameConfig?.meta?.default_user_id ?? "test_user";
          const payload = {
            user_id: userId,
            coins: state.gold,
            highest_wave: state.highestWave,
            grid_data: buildGridData2D(),
          };
          await apiFetchJson("/api/save", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          showToast("已保存");
        } catch (err) {
          showToast("保存失败");
        }
      });

      pauseBtn.addEventListener("click", () => {
        if (state.gameOver) return;
        state.running = !state.running;
        pauseBtn.textContent = state.running ? "暂停" : "继续";
        syncUI();
      });
      restartBtn.addEventListener("click", () => {
        pauseBtn.textContent = "暂停";
        resetGame();
      });
      restartBtn2.addEventListener("click", () => {
        pauseBtn.textContent = "暂停";
        resetGame();
      });

      window.addEventListener("resize", () => {
        fitCanvasToCssSize(battleCanvas);
      });

      async function bootstrap() {
        hudLeftEl.textContent = "状态：加载中";
        placeBtn.disabled = true;
        upgradeBtn.disabled = true;
        saveBtn.disabled = true;
        pauseBtn.disabled = true;

        try {
          gameConfig = await apiFetchJson("/api/config");
          START_GOLD = Number(gameConfig?.meta?.start_gold) || START_GOLD;
          const xpList = gameConfig?.player?.xp_to_next_level;
          if (Array.isArray(xpList) && xpList.length) {
            xpToNextLevels = xpList.map((v) => Math.max(1, Math.floor(Number(v) || 1)));
          }
        } catch (err) {
          gameConfig = null;
          showToast("配置加载失败，使用本地默认值");
        }

        resetGame();
        requestAnimationFrame(frame);

        try {
          const userId = gameConfig?.meta?.default_user_id ?? "test_user";
          const save = await apiFetchJson(`/api/load/${encodeURIComponent(userId)}`);
          if (save?.exists && save?.grid_data && Array.isArray(save.grid_data)) {
            const wave = Number(save.highest_wave) || 1;
            state.gold = Number(save.coins) || START_GOLD;
            state.highestWave = wave;
            state.timeSec = 0;
            startWave(wave);

            const levels2d = save.grid_data;
            state.grid = Array.from({ length: GRID_SIZE * GRID_SIZE }, () => null);
            for (let r = 0; r < GRID_SIZE; r++) {
              for (let c = 0; c < GRID_SIZE; c++) {
                const lv = Number(levels2d?.[r]?.[c] ?? 0);
                if (lv > 0) state.grid[rcToIndex(r, c)] = createTower(lv);
              }
            }
            renderGrid();
            syncUI();
            showToast("已恢复存档");
          }
        } catch (err) {
        }
      }

      bootstrap();
    </script>
  </body>
</html>
