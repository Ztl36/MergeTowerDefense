<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>割草合成塔防（MVP）</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: #141b2d;
        --panel2: #0f1627;
        --text: #e6eaf2;
        --muted: #a8b0c2;
        --accent: #5ae4a8;
        --danger: #ff5a6a;
        --grid-gap: 10px;
        --radius: 12px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "PingFang SC",
          "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background: radial-gradient(1200px 700px at 50% -150px, #1f2b52 0%, var(--bg) 55%);
      }

      .app {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 18px 16px;
        gap: 14px;
      }

      .frame {
        width: min(1100px, 100%);
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .top {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0) 100%),
          var(--panel);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: var(--radius);
        overflow: hidden;
      }

      .canvasWrap {
        position: relative;
      }

      canvas {
        width: 100%;
        height: 420px;
        display: block;
        background: linear-gradient(180deg, rgba(90, 228, 168, 0.06) 0%, rgba(0, 0, 0, 0) 45%),
          radial-gradient(900px 380px at 50% 0%, rgba(96, 165, 250, 0.14) 0%, rgba(0, 0, 0, 0) 60%);
      }

      .hud {
        position: absolute;
        top: 12px;
        left: 12px;
        right: 12px;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        pointer-events: none;
      }

      .hud .pill {
        padding: 8px 10px;
        border-radius: 999px;
        background: rgba(15, 22, 39, 0.76);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: var(--text);
        font-size: 12px;
        display: inline-flex;
        gap: 10px;
        align-items: center;
      }

      .mid {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0) 100%),
          var(--panel);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: var(--radius);
        padding: 14px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .gridHead {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
      }

      .gridHead h2 {
        font-size: 14px;
        margin: 0;
        color: var(--text);
        font-weight: 650;
        letter-spacing: 0.2px;
      }

      .gridHead .hint {
        font-size: 12px;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: var(--grid-gap);
        touch-action: none;
        user-select: none;
      }

      .cell {
        aspect-ratio: 1 / 1;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        position: relative;
        overflow: hidden;
      }

      .cell::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(200px 120px at 50% -40px, rgba(90, 228, 168, 0.08) 0%, rgba(0, 0, 0, 0) 60%);
        opacity: 0.8;
        pointer-events: none;
      }

      .cell.isTarget {
        outline: 2px solid rgba(90, 228, 168, 0.75);
        box-shadow: 0 0 0 4px rgba(90, 228, 168, 0.14);
      }

      .cell.isMergeTarget {
        outline: 2px solid rgba(96, 165, 250, 0.85);
        box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.16);
      }

      .tower {
        position: absolute;
        inset: 10px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        font-weight: 800;
        font-size: 22px;
        letter-spacing: 0.3px;
        color: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(0, 0, 0, 0.25);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.25);
        cursor: grab;
      }

      .tower:active {
        cursor: grabbing;
      }

      .tower .sub {
        position: absolute;
        top: 8px;
        left: 8px;
        font-size: 11px;
        opacity: 0.85;
        font-weight: 700;
      }

      .towerGhost {
        position: fixed;
        width: 84px;
        height: 84px;
        border-radius: 14px;
        pointer-events: none;
        display: grid;
        place-items: center;
        font-weight: 800;
        font-size: 22px;
        color: rgba(255, 255, 255, 0.95);
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.12);
        transform: translate(-9999px, -9999px);
        z-index: 9999;
      }

      .bottom {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0) 100%),
          var(--panel);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: var(--radius);
        padding: 12px 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .stats {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--text);
        font-size: 13px;
      }

      .stats .k {
        color: var(--muted);
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      button {
        border: none;
        border-radius: 12px;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.07);
        color: var(--text);
        border: 1px solid rgba(255, 255, 255, 0.12);
        cursor: pointer;
        transition: transform 140ms ease, background 140ms ease, border-color 140ms ease;
        font-weight: 650;
        font-size: 13px;
      }

      button:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.18);
      }

      button:active {
        transform: translateY(0px);
      }

      button.primary {
        background: rgba(90, 228, 168, 0.16);
        border-color: rgba(90, 228, 168, 0.45);
      }

      button.primary:hover {
        background: rgba(90, 228, 168, 0.22);
        border-color: rgba(90, 228, 168, 0.6);
      }

      button.danger {
        background: rgba(255, 90, 106, 0.14);
        border-color: rgba(255, 90, 106, 0.4);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
        transform: none;
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 20px;
        transform: translate(-50%, 20px);
        opacity: 0;
        background: rgba(15, 22, 39, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: var(--text);
        border-radius: 999px;
        padding: 10px 12px;
        font-size: 13px;
        display: inline-flex;
        gap: 8px;
        align-items: center;
        transition: transform 180ms ease, opacity 180ms ease;
        z-index: 10000;
        pointer-events: none;
      }

      .toast.show {
        transform: translate(-50%, 0px);
        opacity: 1;
      }

      .overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.52);
        display: none;
        place-items: center;
      }

      .overlay.show {
        display: grid;
      }

      .card {
        width: min(520px, calc(100% - 28px));
        background: rgba(15, 22, 39, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 16px;
        padding: 16px;
      }

      .card h3 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      .card p {
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .card .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      @media (max-width: 720px) {
        canvas {
          height: 360px;
        }

        .towerGhost {
          width: 72px;
          height: 72px;
        }

        .tower {
          font-size: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="frame">
        <div class="top">
          <div class="canvasWrap">
            <canvas id="battle" width="1100" height="420"></canvas>
            <div class="hud">
              <div class="pill" id="hudLeft">状态：运行中</div>
              <div class="pill" id="hudRight">难度：1.00 · 生成间隔：900ms</div>
            </div>
            <div class="overlay" id="overlay">
              <div class="card">
                <h3>失败</h3>
                <p id="overText">有敌人突破了防线。</p>
                <div class="row">
                  <span style="color: var(--muted); font-size: 12px">提示：拖拽同等级塔合成升级</span>
                  <button id="restartBtn2" class="primary">重开</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="mid">
          <div class="gridHead">
            <h2>塔防网格（5×5）</h2>
            <div class="hint">拖拽移动，拖到同等级塔上合成升级</div>
          </div>
          <div class="grid" id="grid"></div>
        </div>

        <div class="bottom">
          <div class="stats">
            <span><span class="k">金币</span>：<span id="gold">100</span></span>
            <span><span class="k">分数</span>：<span id="score">0</span></span>
            <span><span class="k">击杀</span>：<span id="kills">0</span></span>
            <span><span class="k">波次</span>：<span id="wave">1</span></span>
          </div>
          <div class="actions">
            <button id="buyBtn" class="primary">购买防御塔（10）</button>
            <button id="saveBtn">保存游戏</button>
            <button id="pauseBtn">暂停</button>
            <button id="restartBtn" class="danger">重开</button>
          </div>
        </div>
      </div>
    </div>

    <div class="towerGhost" id="towerGhost">1</div>
    <div class="toast" id="toast"></div>

    <script>
      const GRID_SIZE = 5;
      let BUY_COST = 10;
      let START_GOLD = 100;
      const API_BASE = "http://127.0.0.1:8000";
      let gameConfig = null;

      const battleCanvas = document.getElementById("battle");
      const ctx = battleCanvas.getContext("2d");
      const gridEl = document.getElementById("grid");

      const hudLeftEl = document.getElementById("hudLeft");
      const hudRightEl = document.getElementById("hudRight");
      const overlayEl = document.getElementById("overlay");
      const overTextEl = document.getElementById("overText");

      const goldEl = document.getElementById("gold");
      const scoreEl = document.getElementById("score");
      const killsEl = document.getElementById("kills");
      const waveEl = document.getElementById("wave");
      const buyBtn = document.getElementById("buyBtn");
      const saveBtn = document.getElementById("saveBtn");
      const pauseBtn = document.getElementById("pauseBtn");
      const restartBtn = document.getElementById("restartBtn");
      const restartBtn2 = document.getElementById("restartBtn2");

      const towerGhostEl = document.getElementById("towerGhost");
      const toastEl = document.getElementById("toast");

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function randInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function pickRandom(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
      }

      function showToast(text) {
        toastEl.textContent = text;
        toastEl.classList.add("show");
        window.clearTimeout(showToast._t);
        showToast._t = window.setTimeout(() => toastEl.classList.remove("show"), 1000);
      }

      function fitCanvasToCssSize(canvas) {
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        const w = Math.max(1, Math.floor(rect.width * dpr));
        const h = Math.max(1, Math.floor(rect.height * dpr));
        if (canvas.width !== w || canvas.height !== h) {
          canvas.width = w;
          canvas.height = h;
        }
      }

      function towerColor(level) {
        const hue = (210 + (level - 1) * 32) % 360;
        return `hsl(${hue} 85% 55%)`;
      }

      function towerColorDark(level) {
        const hue = (210 + (level - 1) * 32) % 360;
        return `hsl(${hue} 85% 44%)`;
      }

      function getTowerStats(level) {
        const maxLv = gameConfig?.meta?.max_tower_level ?? 5;
        const lv = clamp(level, 1, maxLv);
        const t = gameConfig?.towers?.[String(lv)] ?? null;
        if (t) {
          return {
            damage: Number(t.damage) || 1,
            fireRate: Number(t.fire_rate) || 1,
            bulletSpeed: Number(t.bullet_speed) || 520,
            range: 99999,
          };
        }
        return {
          damage: 1 + lv * 1,
          fireRate: 0.65 + lv * 0.25,
          bulletSpeed: 520 + lv * 35,
          range: 99999,
        };
      }

      function getWaveConfig(wave) {
        const ws = gameConfig?.waves ?? [];
        if (!ws.length) {
          return {
            wave,
            spawn_interval_ms: 900,
            enemy_hp: 3,
            enemy_speed: 55,
            kill_reward: 1,
          };
        }
        const idx = clamp(wave - 1, 0, ws.length - 1);
        return ws[idx];
      }

      function computeWaveFromTimeSec(timeSec) {
        const dur = gameConfig?.meta?.wave_duration_sec ?? 12;
        return 1 + Math.floor(timeSec / dur);
      }

      function updateBuyButtonLabel() {
        buyBtn.textContent = `购买防御塔（${BUY_COST}）`;
      }

      function buildGridData2D() {
        const out = [];
        for (let r = 0; r < GRID_SIZE; r++) {
          const row = [];
          for (let c = 0; c < GRID_SIZE; c++) {
            const idx = rcToIndex(r, c);
            row.push(state.grid[idx]?.level ?? 0);
          }
          out.push(row);
        }
        return out;
      }

      async function apiFetchJson(path, init) {
        const res = await fetch(`${API_BASE}${path}`, init);
        if (!res.ok) {
          const text = await res.text().catch(() => "");
          throw new Error(`${res.status} ${res.statusText}${text ? `: ${text}` : ""}`);
        }
        return await res.json();
      }

      const state = {
        running: true,
        gameOver: false,
        startedAt: performance.now(),
        timeSec: 0,
        gold: START_GOLD,
        score: 0,
        kills: 0,
        wave: 1,
        highestWave: 1,

        grid: Array.from({ length: GRID_SIZE * GRID_SIZE }, () => null),

        enemies: [],
        bullets: [],

        spawnIntervalMs: 900,
        spawnTimerMs: 0,
      };

      function resetGame() {
        state.running = true;
        state.gameOver = false;
        overlayEl.classList.remove("show");
        state.startedAt = performance.now();
        state.timeSec = 0;
        state.gold = START_GOLD;
        state.score = 0;
        state.kills = 0;
        state.wave = 1;
        state.highestWave = 1;

        state.grid = Array.from({ length: GRID_SIZE * GRID_SIZE }, () => null);
        state.enemies = [];
        state.bullets = [];
        state.spawnIntervalMs = getWaveConfig(1).spawn_interval_ms;
        state.spawnTimerMs = 120;
        syncUI();
      }


      function indexToRC(index) {
        return { r: Math.floor(index / GRID_SIZE), c: index % GRID_SIZE };
      }

      function rcToIndex(r, c) {
        return r * GRID_SIZE + c;
      }

      function getTowerWorldPos(index) {
        const { c } = indexToRC(index);
        const x = ((c + 0.5) / GRID_SIZE) * battleCanvas.width;
        const y = battleCanvas.height - 10;
        return { x, y };
      }

      function createTower(level) {
        const stats = getTowerStats(level);
        return {
          level,
          fireCooldown: 0,
          stats,
        };
      }

      function getEmptyCells() {
        const out = [];
        for (let i = 0; i < state.grid.length; i++) {
          if (!state.grid[i]) out.push(i);
        }
        return out;
      }

      function buyTower() {
        if (state.gameOver) return;
        if (state.gold < BUY_COST) {
          showToast("金币不足");
          return;
        }
        const empties = getEmptyCells();
        if (empties.length === 0) {
          showToast("网格已满");
          return;
        }
        state.gold -= BUY_COST;
        const idx = pickRandom(empties);
        state.grid[idx] = createTower(1);
        renderGrid();
        syncUI();
      }

      function syncUI() {
        goldEl.textContent = String(state.gold);
        scoreEl.textContent = String(state.score);
        killsEl.textContent = String(state.kills);
        waveEl.textContent = String(state.wave);
        buyBtn.disabled = state.gold < BUY_COST || getEmptyCells().length === 0 || state.gameOver;
        saveBtn.disabled = state.gameOver;
        pauseBtn.disabled = state.gameOver;
        hudLeftEl.textContent = state.gameOver
          ? "状态：失败"
          : state.running
            ? "状态：运行中"
            : "状态：已暂停";
        hudRightEl.textContent = `波次：${state.wave} · 生成间隔：${Math.round(state.spawnIntervalMs)}ms`;
      }

      function renderGrid(targetIndex = null, canMerge = false) {
        const children = gridEl.children;
        if (children.length !== GRID_SIZE * GRID_SIZE) {
          gridEl.innerHTML = "";
          for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
            const cell = document.createElement("div");
            cell.className = "cell";
            cell.dataset.index = String(i);
            gridEl.appendChild(cell);
          }
        }

        for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
          const cell = gridEl.children[i];
          cell.classList.toggle("isTarget", targetIndex === i && !canMerge);
          cell.classList.toggle("isMergeTarget", targetIndex === i && canMerge);

          const tower = state.grid[i];
          cell.innerHTML = "";
          if (tower) {
            const el = document.createElement("div");
            el.className = "tower";
            el.style.background = `linear-gradient(180deg, ${towerColor(tower.level)} 0%, ${towerColorDark(tower.level)} 100%)`;

            const sub = document.createElement("div");
            sub.className = "sub";
            sub.textContent = `Lv.${tower.level}`;
            el.appendChild(sub);

            el.appendChild(document.createTextNode(String(tower.level)));
            el.dataset.index = String(i);
            cell.appendChild(el);
          }
        }
      }

      const drag = {
        active: false,
        fromIndex: -1,
        tower: null,
        pointerId: null,
        pointerX: 0,
        pointerY: 0,
        targetIndex: null,
        canMerge: false,
      };

      function setGhostForTower(tower) {
        towerGhostEl.textContent = String(tower.level);
        towerGhostEl.style.background = `linear-gradient(180deg, ${towerColor(tower.level)} 0%, ${towerColorDark(tower.level)} 100%)`;
      }

      function moveGhostTo(x, y) {
        const rect = towerGhostEl.getBoundingClientRect();
        const w = rect.width || 84;
        const h = rect.height || 84;
        towerGhostEl.style.transform = `translate(${Math.round(x - w / 2)}px, ${Math.round(y - h / 2)}px)`;
      }

      function clearGhost() {
        towerGhostEl.style.transform = "translate(-9999px, -9999px)";
      }

      function getCellIndexFromPointer(clientX, clientY) {
        const rect = gridEl.getBoundingClientRect();

        // 拖拽“碰撞检测”核心：把指针坐标映射到网格格子索引。
        // 1) rect 是网格在视口坐标系中的位置与尺寸
        // 2) 若指针不在 rect 范围内，等价于“没有碰撞到任何格子”，返回 null
        // 3) 若在范围内，把 (clientX, clientY) 转成网格内局部坐标，再换算 row/col
        if (clientX < rect.left || clientX > rect.right || clientY < rect.top || clientY > rect.bottom) {
          return null;
        }

        // 视口坐标 → 网格局部坐标（左上角为 0,0）
        const localX = clientX - rect.left;
        const localY = clientY - rect.top;

        // 局部坐标按比例映射到 0..GRID_SIZE-1。
        // 注意：我们不依赖每个格子的 DOM hit-test，而是用“几何计算”直接得到格子索引，
        // 这样不会受格子间 gap、塔元素遮挡等影响，逻辑更稳定。
        const col = clamp(Math.floor((localX / rect.width) * GRID_SIZE), 0, GRID_SIZE - 1);
        const row = clamp(Math.floor((localY / rect.height) * GRID_SIZE), 0, GRID_SIZE - 1);

        return rcToIndex(row, col);
      }

      function beginDrag(fromIndex, tower, e) {
        drag.active = true;
        drag.fromIndex = fromIndex;
        drag.tower = tower;
        drag.pointerId = e.pointerId;
        drag.pointerX = e.clientX;
        drag.pointerY = e.clientY;
        drag.targetIndex = null;
        drag.canMerge = false;

        setGhostForTower(tower);
        moveGhostTo(e.clientX, e.clientY);

        // 网格状态更新（开始拖拽）：
        // - 将“起点格”的塔临时从 grid 中移除（置为 null），让 UI 立即表现为“空位”。
        // - 拖拽过程中，放置逻辑统一以 state.grid 为准：
        //   - 拖到空格 => 移动
        //   - 拖到同等级塔 => 合成
        //   - 其他 => 回退
        // - 若最终放置非法或取消拖拽，会在 cancelDrag() 里把塔放回 fromIndex。
        state.grid[fromIndex] = null;
        renderGrid();
      }

      function cancelDrag(reason) {
        if (!drag.active) return;
        state.grid[drag.fromIndex] = drag.tower;
        drag.active = false;
        drag.fromIndex = -1;
        drag.tower = null;
        drag.pointerId = null;
        drag.targetIndex = null;
        drag.canMerge = false;
        clearGhost();
        renderGrid();
        if (reason === "invalid") {
          showToast("不能放在这里");
        }
      }

      function commitDrop() {
        if (!drag.active) return;

        const fromIndex = drag.fromIndex;
        const tower = drag.tower;
        const targetIndex = drag.targetIndex;

        // 放置判定（核心）：targetIndex 来源于 pointermove 阶段的“碰撞检测”。
        // - 为 null：说明松手时指针不在网格内 → 视为非法放置 → 回退到原位
        if (targetIndex == null) {
          cancelDrag("invalid");
          return;
        }

        if (targetIndex === fromIndex) {
          cancelDrag("invalid");
          return;
        }

        // 取出目标格当前的塔（如果有）。注意：起点格的塔在 beginDrag 时已经从 grid 移除了。
        const targetTower = state.grid[targetIndex];

        // 规则 1：目标为空格 → 直接移动（把拖拽塔写入目标格）
        if (!targetTower) {
          state.grid[targetIndex] = tower;
          drag.active = false;
          drag.fromIndex = -1;
          drag.tower = null;
          drag.pointerId = null;
          drag.targetIndex = null;
          drag.canMerge = false;
          clearGhost();
          renderGrid();
          return;
        }

        // 规则 2：目标为同等级塔 → 合成升级。
        // - 消耗：目标格的塔 + 拖拽塔
        // - 结果：目标格生成 level+1 的新塔
        if (targetTower.level === tower.level) {
          state.grid[targetIndex] = createTower(tower.level + 1);
          drag.active = false;
          drag.fromIndex = -1;
          drag.tower = null;
          drag.pointerId = null;
          drag.targetIndex = null;
          drag.canMerge = false;
          clearGhost();
          renderGrid();
          showToast(`合成成功：${tower.level} + ${tower.level} = ${tower.level + 1}`);
          return;
        }

        // 规则 3：目标为不同等级塔 → 非法放置 → 回退到起点
        cancelDrag("invalid");
      }

      gridEl.addEventListener("pointerdown", (e) => {
        const towerEl = e.target.closest(".tower");
        if (!towerEl) return;
        if (state.gameOver) return;
        if (!state.running) return;

        const fromIndex = Number(towerEl.dataset.index);
        const tower = state.grid[fromIndex];
        if (!tower) return;

        e.preventDefault();
        towerEl.setPointerCapture(e.pointerId);
        beginDrag(fromIndex, tower, e);
      });

      gridEl.addEventListener("pointermove", (e) => {
        if (!drag.active) return;
        if (e.pointerId !== drag.pointerId) return;
        e.preventDefault();
        drag.pointerX = e.clientX;
        drag.pointerY = e.clientY;
        moveGhostTo(e.clientX, e.clientY);

        const idx = getCellIndexFromPointer(e.clientX, e.clientY);
        drag.targetIndex = idx;

        let canMerge = false;
        if (idx != null) {
          const t = state.grid[idx];
          canMerge = Boolean(t && drag.tower && t.level === drag.tower.level);
        }
        drag.canMerge = canMerge;
        renderGrid(idx, canMerge);
      });

      gridEl.addEventListener("pointerup", (e) => {
        if (!drag.active) return;
        if (e.pointerId !== drag.pointerId) return;
        e.preventDefault();
        commitDrop();
        syncUI();
      });

      gridEl.addEventListener("pointercancel", (e) => {
        if (!drag.active) return;
        if (e.pointerId !== drag.pointerId) return;
        e.preventDefault();
        cancelDrag("invalid");
        syncUI();
      });

      function createEnemy(waveCfg) {
        const size = 26;
        const x = randInt(20, battleCanvas.width - 20);

        const hp = Number(waveCfg.enemy_hp) || 3;
        const speed = Number(waveCfg.enemy_speed) || 55;
        const reward = Number(waveCfg.kill_reward) || 1;

        return {
          id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          x,
          y: -size,
          size,
          hp,
          hpMax: hp,
          speed,
          reward,
        };
      }

      function spawnEnemies(dtMs) {
        state.spawnTimerMs -= dtMs;
        while (state.spawnTimerMs <= 0) {
          state.spawnTimerMs += state.spawnIntervalMs;
          state.enemies.push(createEnemy(getWaveConfig(state.wave)));
        }
      }

      function fireFromTower(towerIndex, tower, dtSec) {
        tower.fireCooldown = Math.max(0, tower.fireCooldown - dtSec);
        if (tower.fireCooldown > 0) return;
        if (state.enemies.length === 0) return;

        const origin = getTowerWorldPos(towerIndex);

        let best = null;
        let bestDist2 = Infinity;
        for (const e of state.enemies) {
          const dx = e.x - origin.x;
          const dy = e.y - origin.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < bestDist2) {
            bestDist2 = d2;
            best = e;
          }
        }
        if (!best) return;

        const stats = tower.stats;
        const dx = best.x - origin.x;
        const dy = best.y - origin.y;
        const len = Math.hypot(dx, dy) || 1;
        const vx = (dx / len) * stats.bulletSpeed;
        const vy = (dy / len) * stats.bulletSpeed;

        state.bullets.push({
          x: origin.x,
          y: origin.y,
          vx,
          vy,
          r: 4,
          dmg: stats.damage,
          ttl: 1.8,
        });

        tower.fireCooldown = 1 / stats.fireRate;
      }

      function updateTowers(dtSec) {
        for (let i = 0; i < state.grid.length; i++) {
          const tower = state.grid[i];
          if (!tower) continue;
          fireFromTower(i, tower, dtSec);
        }
      }

      function updateEnemies(dtSec) {
        const bottom = battleCanvas.height - 4;
        for (const e of state.enemies) {
          e.y += e.speed * dtSec;
          if (e.y + e.size / 2 >= bottom) {
            state.gameOver = true;
          }
        }
      }

      function updateBullets(dtSec) {
        for (const b of state.bullets) {
          b.x += b.vx * dtSec;
          b.y += b.vy * dtSec;
          b.ttl -= dtSec;
        }
        state.bullets = state.bullets.filter((b) => b.ttl > 0);
      }

      function resolveHits() {
        const remainingBullets = [];

        for (const b of state.bullets) {
          let hit = false;
          for (const e of state.enemies) {
            const dx = e.x - b.x;
            const dy = e.y - b.y;
            const rr = e.size / 2 + b.r;
            if (dx * dx + dy * dy <= rr * rr) {
              e.hp -= b.dmg;
              hit = true;
              break;
            }
          }
          if (!hit) remainingBullets.push(b);
        }

        state.bullets = remainingBullets;

        const alive = [];
        for (const e of state.enemies) {
          if (e.hp <= 0) {
            state.kills += 1;
            state.score += 1;
            state.gold += e.reward || 1;
          } else {
            alive.push(e);
          }
        }
        state.enemies = alive;
      }

      function draw() {
        ctx.clearRect(0, 0, battleCanvas.width, battleCanvas.height);

        const w = battleCanvas.width;
        const h = battleCanvas.height;

        ctx.save();
        ctx.fillStyle = "rgba(255,255,255,0.04)";
        for (let i = 1; i < GRID_SIZE; i++) {
          const x = (i / GRID_SIZE) * w;
          ctx.fillRect(x - 0.5, 0, 1, h);
        }
        ctx.restore();

        ctx.save();
        ctx.strokeStyle = "rgba(90, 228, 168, 0.55)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, h - 3);
        ctx.lineTo(w, h - 3);
        ctx.stroke();
        ctx.restore();

        for (const b of state.bullets) {
          ctx.save();
          ctx.fillStyle = "rgba(0,0,0,0.88)";
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        for (const e of state.enemies) {
          ctx.save();
          ctx.fillStyle = "rgba(255, 90, 106, 0.92)";
          ctx.fillRect(e.x - e.size / 2, e.y - e.size / 2, e.size, e.size);

          const barW = e.size;
          const barH = 5;
          const p = clamp(e.hp / e.hpMax, 0, 1);
          ctx.fillStyle = "rgba(0,0,0,0.38)";
          ctx.fillRect(e.x - barW / 2, e.y - e.size / 2 - 10, barW, barH);
          ctx.fillStyle = "rgba(255,255,255,0.85)";
          ctx.fillRect(e.x - barW / 2, e.y - e.size / 2 - 10, barW * p, barH);
          ctx.restore();
        }

        for (let i = 0; i < state.grid.length; i++) {
          const t = state.grid[i];
          if (!t) continue;
          const origin = getTowerWorldPos(i);
          ctx.save();
          ctx.fillStyle = "rgba(255,255,255,0.08)";
          ctx.beginPath();
          ctx.arc(origin.x, origin.y, 6, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      let lastTs = performance.now();
      function frame(ts) {
        const dtMs = clamp(ts - lastTs, 0, 50);
        lastTs = ts;

        fitCanvasToCssSize(battleCanvas);

        if (state.running && !state.gameOver) {
          state.timeSec = (ts - state.startedAt) / 1000;
          state.wave = computeWaveFromTimeSec(state.timeSec);
          state.highestWave = Math.max(state.highestWave, state.wave);
          state.spawnIntervalMs = getWaveConfig(state.wave).spawn_interval_ms;

          spawnEnemies(dtMs);

          const dtSec = dtMs / 1000;
          updateTowers(dtSec);
          updateEnemies(dtSec);
          updateBullets(dtSec);
          resolveHits();
        }

        if (state.gameOver) {
          state.running = false;
          overlayEl.classList.add("show");
          overTextEl.textContent = `有敌人突破了防线。你坚持了 ${state.timeSec.toFixed(1)} 秒，击杀 ${state.kills}。`;
        }

        draw();
        syncUI();
        requestAnimationFrame(frame);
      }

      buyBtn.addEventListener("click", () => buyTower());

      saveBtn.addEventListener("click", async () => {
        try {
          const userId = gameConfig?.meta?.default_user_id ?? "test_user";
          const payload = {
            user_id: userId,
            coins: state.gold,
            highest_wave: state.highestWave,
            grid_data: buildGridData2D(),
          };
          await apiFetchJson("/api/save", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          showToast("已保存");
        } catch (err) {
          showToast("保存失败");
        }
      });

      pauseBtn.addEventListener("click", () => {
        if (state.gameOver) return;
        state.running = !state.running;
        pauseBtn.textContent = state.running ? "暂停" : "继续";
        syncUI();
      });
      restartBtn.addEventListener("click", () => {
        pauseBtn.textContent = "暂停";
        resetGame();
      });
      restartBtn2.addEventListener("click", () => {
        pauseBtn.textContent = "暂停";
        resetGame();
      });

      window.addEventListener("resize", () => {
        fitCanvasToCssSize(battleCanvas);
      });

      async function bootstrap() {
        hudLeftEl.textContent = "状态：加载中";
        buyBtn.disabled = true;
        saveBtn.disabled = true;
        pauseBtn.disabled = true;

        try {
          gameConfig = await apiFetchJson("/api/config");
          BUY_COST = Number(gameConfig?.meta?.buy_cost) || BUY_COST;
          START_GOLD = Number(gameConfig?.meta?.start_gold) || START_GOLD;
          updateBuyButtonLabel();
        } catch (err) {
          gameConfig = null;
          showToast("配置加载失败，使用本地默认值");
        }

        resetGame();
        requestAnimationFrame(frame);

        try {
          const userId = gameConfig?.meta?.default_user_id ?? "test_user";
          const save = await apiFetchJson(`/api/load/${encodeURIComponent(userId)}`);
          if (save?.exists && save?.grid_data && Array.isArray(save.grid_data)) {
            const wave = Number(save.highest_wave) || 1;
            const dur = gameConfig?.meta?.wave_duration_sec ?? 12;
            state.startedAt = performance.now() - Math.max(0, wave - 1) * dur * 1000;
            state.gold = Number(save.coins) || START_GOLD;
            state.wave = wave;
            state.highestWave = wave;

            const levels2d = save.grid_data;
            state.grid = Array.from({ length: GRID_SIZE * GRID_SIZE }, () => null);
            for (let r = 0; r < GRID_SIZE; r++) {
              for (let c = 0; c < GRID_SIZE; c++) {
                const lv = Number(levels2d?.[r]?.[c] ?? 0);
                if (lv > 0) state.grid[rcToIndex(r, c)] = createTower(lv);
              }
            }
            renderGrid();
            syncUI();
            showToast("已恢复存档");
          }
        } catch (err) {
        }
      }

      bootstrap();
    </script>
  </body>
</html>
